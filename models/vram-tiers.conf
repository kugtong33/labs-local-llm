# llama.cpp VRAM Tier Configurations
# Format: tier|ctx_size|n_gpu_layers|batch_size|ubatch_size|description
#
# Fields:
#   tier         — Tier name: 8gb | 16gb | 24gb | 32gb (used with -V flag)
#   ctx_size     — Context window size in tokens (--ctx-size)
#   n_gpu_layers — GPU layers to offload (--n-gpu-layers); 99 = all layers
#   batch_size   — Prompt processing batch size (--batch-size)
#   ubatch_size  — Micro-batch size (--ubatch-size); must be <= batch_size
#   description  — Human-readable label shown in status.sh output
#
# The 8gb tier is the default when -V is omitted. It is intentionally conservative
# to ensure stability across all models that meet the 8gb min_vram_tier requirement.
# Higher tiers unlock larger context windows at the cost of more VRAM.

8gb|2048|99|512|128|Conservative 8 GB — full offload, 2K context
16gb|8192|99|1024|256|Standard 16 GB — full offload, 8K context
24gb|16384|99|2048|512|Performance 24 GB — full offload, 16K context
32gb|32768|99|4096|512|Maximum 32 GB — full offload, 32K context
