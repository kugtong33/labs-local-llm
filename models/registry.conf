glm-4|glm4|8|16|stable|bartowski/glm-4-9b-chat-GGUF|glm-4-9b-chat-Q4_K_M.gguf|8gb
qwen3-coder|qwen3-coder|6|12|stable|Qwen/Qwen3-Coder-GGUF|Qwen3-Coder-Q4_K_M.gguf|8gb
