# Local LLM Model Registry
# Format: id|ollama_id|min_vram_gb|min_ram_gb|status
#
# Fields:
#   id          — Short name used in scripts: ./scripts/provision.sh -m <id>
#   ollama_id   — Ollama library identifier (used for: ollama pull <ollama_id>)
#   min_vram_gb — Minimum NVIDIA VRAM required for GPU inference
#   min_ram_gb  — Minimum system RAM required for CPU inference
#   status      — stable | experimental
#
# Adding a new model: append a line following the same format.
# The provision script validates -m values against the id column.

deepseek-v3|deepseek-v3|80|200|stable
glm-4|glm4|8|16|stable
minimax-m1|minimax-m1|40|80|experimental
qwen3-coder|qwen3-coder|6|12|stable
