# Local LLM Model Registry
# Format: id|ollama_id|min_vram_gb|min_ram_gb|status|gguf_hf_repo|gguf_filename|min_vram_tier
#
# Fields:
#   id             — Short name used in scripts: ./scripts/provision.sh -m <id>
#   ollama_id      — Ollama library identifier (used for: ollama pull <ollama_id>)
#   min_vram_gb    — Minimum NVIDIA VRAM required for GPU inference (GB)
#   min_ram_gb     — Minimum system RAM required for CPU inference (GB)
#   status         — stable | experimental
#   gguf_hf_repo   — HuggingFace repo path for llama.cpp GGUF download (owner/repo)
#                    Use "local" for user-provided GGUFs (no automatic download)
#   gguf_filename  — GGUF filename within the HF repo (stored in $MODEL_CACHE_DIR)
#   min_vram_tier  — Minimum VRAM tier for llama.cpp: 8gb | 16gb | 24gb | 32gb
#
# Adding a new model: append a line following the same format.
# The provision script validates -m values against the id column.
#
# NOTE on GGUF filenames: filenames use Q4_K_M quantization (best quality/size ratio).
# deepseek-v3: the Q4_K_M GGUF is extremely large (~400 GB); see README for details.
# qwen3-coder: verify actual published filename at the HF repo before downloading.

deepseek-v3|deepseek-v3|80|200|stable|unsloth/DeepSeek-V3-GGUF|DeepSeek-V3-Q4_K_M.gguf|32gb
glm-4|glm4|8|16|stable|bartowski/glm-4-9b-chat-GGUF|glm-4-9b-chat-Q4_K_M.gguf|8gb
minimax-m1|minimax-m1|40|80|experimental|local|minimax-m1.gguf|24gb
qwen3-coder|qwen3-coder|6|12|stable|Qwen/Qwen3-Coder-GGUF|Qwen3-Coder-Q4_K_M.gguf|8gb
