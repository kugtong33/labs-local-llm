version: "3.8"

# ── Shared configuration: Ollama ──────────────────────────────────────────────
# Both Ollama service variants (GPU and CPU) inherit this block via YAML anchors.
x-llm-base: &llm-base
  image: ollama/ollama:latest
  container_name: llm-server
  ports:
    - "${LLM_PORT:-11434}:11434"
  volumes:
    - model-cache:/root/.ollama
  environment:
    - OLLAMA_HOST=0.0.0.0
    - OLLAMA_MAX_LOADED_MODELS=1
    - OLLAMA_KEEP_ALIVE=24h
    - OLLAMA_ORIGINS=*
    - OLLAMA_MODELS=/root/.ollama/models
    - HF_TOKEN=${HF_TOKEN:-}
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 180s

# ── Shared configuration: llama.cpp ───────────────────────────────────────────
# Both llama.cpp service variants inherit this block.
# Parameterized via LLAMACPP_* environment variables exported by provision.sh.
# Port: maps host ${LLM_PORT:-11434} → container 8080 (llama-server default).
# Health check: /v1/models returns 200 only when model is fully loaded.
x-llamacpp-base: &llamacpp-base
  container_name: llm-server
  ports:
    - "${LLM_PORT:-11434}:8080"
  volumes:
    - model-cache:/models
  environment:
    - HF_TOKEN=${HF_TOKEN:-}
  command: >
    --model /models/${LLAMACPP_MODEL_FILE}
    --host 0.0.0.0
    --port 8080
    --ctx-size ${LLAMACPP_CTX_SIZE:-2048}
    --n-gpu-layers ${LLAMACPP_N_GPU_LAYERS:-99}
    --batch-size ${LLAMACPP_BATCH_SIZE:-512}
    --ubatch-size ${LLAMACPP_UBATCH_SIZE:-128}
    --cont-batching
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/models || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 180s

services:

  # ── Ollama GPU variant ────────────────────────────────────────────────────────
  # Activate with: docker compose --profile gpu up -d
  # Requires NVIDIA Container Toolkit on the host.
  llm-gpu:
    <<: *llm-base
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]

  # ── Ollama CPU-only variant ───────────────────────────────────────────────────
  # Activate with: docker compose --profile cpu up -d
  # Works on any machine without a GPU.
  llm-cpu:
    <<: *llm-base
    profiles: [cpu]

  # ── llama.cpp GPU variant ─────────────────────────────────────────────────────
  # Activate with: docker compose --profile llamacpp-gpu up -d
  # Requires NVIDIA Container Toolkit on the host.
  # Set LLAMACPP_MODEL_FILE, LLAMACPP_CTX_SIZE, etc. before invoking.
  llm-llamacpp-gpu:
    <<: *llamacpp-base
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    profiles: [llamacpp-gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]

  # ── llama.cpp CPU-only variant ────────────────────────────────────────────────
  # Activate with: docker compose --profile llamacpp-cpu up -d
  # Works on any machine without a GPU.
  llm-llamacpp-cpu:
    <<: *llamacpp-base
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: [llamacpp-cpu]

# ── Volumes ───────────────────────────────────────────────────────────────────
# model-cache persists model weights across container restarts.
# It survives `docker compose down` but is removed by `clean.sh --purge-models`.
# MODEL_CACHE_DIR is always exported by provision.sh before invoking Docker Compose.
# Default (set in provision.sh): ~/.local/share/llm-models
# For llama.cpp, GGUF files are stored in the same directory.
volumes:
  model-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${MODEL_CACHE_DIR}"
