# OpenCode — Local LLM Configuration
#
# Place this file at: ~/.config/opencode/config.toml
# Or set environment variables (overrides config file):
#   OPENAI_BASE_URL=http://localhost:11434/v1
#   OPENAI_API_KEY=local
#
# IMPORTANT: The `model` value must exactly match the `id` returned by:
#   curl http://localhost:11434/v1/models
# After provisioning glm-4, the id will be "glm4:latest".
# After provisioning deepseek-v3, it will be "deepseek-v3:latest".
#
# Start the server first: ./scripts/provision.sh -m glm-4

[model]
provider = "openai"
model    = "glm4:latest"
base_url = "http://localhost:11434/v1"
api_key  = "local"
